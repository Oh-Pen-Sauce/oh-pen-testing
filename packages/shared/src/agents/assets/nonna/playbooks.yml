# playbook categories during scans and remediation. Nonna runs as a
# hook AFTER the worker's patch is produced, BEFORE it hits the
# filesystem or git, regardless of which playbook found the issue.
#
# This file exists so the agent-profile loader can find her and the
# /agents/nonna page renders without 404'ing — but the list stays
# empty by design.

