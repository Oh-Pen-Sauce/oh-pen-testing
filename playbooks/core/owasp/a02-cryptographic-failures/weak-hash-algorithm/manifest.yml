id: owasp/a02-cryptographic-failures/weak-hash-algorithm
version: 1.0.0
category: owasp-top-10
owasp_ref: A02:2021
cwe: [CWE-327, CWE-328]
severity_default: high
languages: [javascript, typescript, python, java, go, ruby, php]
authors: [oh-pen-testing-core]
description: Detects MD5 / SHA-1 used in a security-relevant context (passwords, tokens, signatures).
impact: |
  MD5 and SHA-1 are broken for security use — pre-computed rainbow tables crack most MD5-hashed passwords in seconds, and SHA-1 collisions are now practically feasible. An attacker who obtains your hash database can recover plaintext passwords offline without ever touching your server. For digital signatures, SHA-1 collision attacks allow forging signed documents or tokens, undermining integrity guarantees entirely.
risky: false
requires_ai: true
type: regex
rules:
  - id: node-crypto-weak-hash
    description: Node crypto.createHash("md5"|"sha1"|"sha").
    pattern: 'crypto\.createHash\s*\(\s*[''"`](md5|sha1|sha)[''"`]\s*\)'
    flags: gi
    require_ai_confirm: true
  - id: python-hashlib-weak
    description: Python hashlib.md5()/sha1() usage.
    pattern: 'hashlib\.(md5|sha1)\s*\('
    flags: g
    require_ai_confirm: true
  - id: java-messagedigest-weak
    description: Java MessageDigest.getInstance("MD5"|"SHA-1"|"SHA").
    pattern: 'MessageDigest\.getInstance\s*\(\s*[''"](MD5|SHA-?1|SHA)[''"]\s*\)'
    flags: g
    require_ai_confirm: true
