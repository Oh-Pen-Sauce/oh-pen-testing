id: owasp/a10-ssrf/user-controlled-fetch
version: 1.0.0
category: owasp-top-10
owasp_ref: A10:2021
cwe: [CWE-918]
severity_default: high
languages: [javascript, typescript, python]
authors: [oh-pen-testing-core]
description: "Detects HTTP clients called with URLs built from user-controlled input (SSRF risk)."
impact: |
  Lets an attacker use your server as a proxy to reach services that aren't publicly accessible — internal admin panels, databases with HTTP APIs, or the cloud metadata endpoint. Because the request originates from the server itself, it bypasses network-level controls and firewall rules that block external traffic. Depending on what internal services are reachable, SSRF can escalate from "read a local file" to full cloud-account takeover via metadata credential theft.
risky: false
requires_ai: true
type: regex
rules:
  - id: fetch-with-req-param
    description: "fetch() or axios call with a URL derived from req.body / req.query / req.params."
    pattern: '(?:fetch|axios(?:\.(?:get|post|put|delete))?|got|request)\s*\(\s*(?:`[^`]*\$\{[^}]*req\.(?:body|query|params)[^}]*\}|["''][^"'']*["'']\s*\+\s*req\.(?:body|query|params))'
    flags: gs
    require_ai_confirm: true
  - id: python-requests-with-input
    description: "requests.get/post with URL concatenated or f-stringed from request input."
    pattern: 'requests\.(?:get|post|put|delete|head|request)\s*\(\s*(?:f["''][^"'']*\{(?:request|input|data)[^}]*\}|["''][^"'']*["'']\s*\+\s*(?:request|input|data)\.)'
    flags: g
    require_ai_confirm: true
