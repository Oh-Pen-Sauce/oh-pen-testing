id: owasp/a03-injection/command-injection
version: 1.0.0
category: owasp-top-10
owasp_ref: A03:2021
cwe: [CWE-78]
severity_default: critical
languages: [javascript, typescript, python]
authors: [oh-pen-testing-core]
description: Detects shell execution with interpolated or concatenated user input.
impact: |
  Gives an attacker full shell access on the server — they can read any file, exfiltrate environment variables (including secrets and credentials), install backdoors, or pivot to internal services. A single semicolon or pipe character in user-supplied input is enough to break out of the intended command. Command injection is reliably rated the most severe class of injection because exploitation requires no special tooling and typically yields immediate root-level access in containerised environments.
risky: false
requires_ai: true
type: regex
rules:
  - id: node-exec-template-literal
    description: child_process.exec/execSync with a template literal.
    pattern: '(?:exec|execSync|spawn|spawnSync)\s*\(\s*`[^`]*\$\{[^}]+\}'
    flags: gs
    require_ai_confirm: true
  - id: node-exec-concat
    description: child_process.exec called with string concatenation.
    pattern: '(?:exec|execSync)\s*\(\s*["''`][^"''`]+["''`]\s*\+\s*\w+'
    flags: g
    require_ai_confirm: true
  - id: python-subprocess-shell-true
    description: subprocess call with shell=True and a non-literal command.
    pattern: 'subprocess\.(?:run|call|Popen|check_call|check_output)\s*\([^)]*shell\s*=\s*True'
    flags: gs
    require_ai_confirm: true
  - id: python-os-system
    description: os.system with an f-string or concatenation.
    pattern: 'os\.system\s*\(\s*(?:f["''][^"'']*\{|\w+\s*\+)'
    flags: g
    require_ai_confirm: true
