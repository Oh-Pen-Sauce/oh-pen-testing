id: owasp/a09-logging/sensitive-data-in-logs
version: 1.0.0
category: owasp-top-10
owasp_ref: A09:2021
cwe: [CWE-532, CWE-312]
severity_default: high
languages: [javascript, typescript, python]
authors: [oh-pen-testing-core]
description: "Detects password, token, or secret values being passed to logging calls."
impact: |
  Secrets written to logs are accessible to anyone with log access — operations staff, third-party log aggregation services, cloud logging dashboards, and anyone who compromises those systems. Unlike a database breach that requires direct access, log exfiltration is often trivial: misconfigured S3 log buckets, overly permissive log viewer roles, or a single leaked log-drain API key exposes everything. Passwords or tokens that appear in logs also tend to persist indefinitely in log archives long after the credential has theoretically been rotated.
risky: false
requires_ai: true
type: regex
rules:
  - id: log-call-sensitive-field
    description: "Logging call referencing a sensitive-named field."
    pattern: '(?:console\.(?:log|info|warn|debug|error)|log(?:ger)?\.(?:info|debug|warn|error|trace)|print|logging\.(?:info|debug|warn|error))\s*\([^)]*\b(?:password|passwd|pwd|secret|api[_-]?key|access[_-]?token|auth[_-]?token|session[_-]?id|credit[_-]?card|cc[_-]?number)\b'
    flags: gi
    require_ai_confirm: true
