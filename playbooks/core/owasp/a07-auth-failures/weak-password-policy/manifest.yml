id: owasp/a07-auth-failures/weak-password-policy
version: 1.0.0
category: owasp-top-10
owasp_ref: A07:2021
cwe: [CWE-521]
severity_default: medium
languages: [javascript, typescript, python]
authors: [oh-pen-testing-core]
description: "Detects password policy configuration permitting very short passwords (< 8 chars)."
impact: |
  A 6-character password space is small enough to exhaust with commodity hardware in minutes — even with bcrypt hashing, a 7-character all-lowercase password falls to a GPU cluster in under an hour. Permissive policies also make credential stuffing attacks more effective, since short passwords are disproportionately common in breach databases. Users allowed to set weak passwords are the weakest link in your authentication chain, regardless of how strong the rest of it is.
risky: false
requires_ai: true
type: regex
rules:
  - id: password-min-length-short
    description: "Password policy with minLength / min_length / passwordMinLength under 8."
    pattern: '(?:minLength|min_length|passwordMinLength|minimumLength|min_password_length)\s*[:=]\s*[1-7]\b'
    flags: gi
    require_ai_confirm: true
  - id: zod-password-min-short
    description: "Zod / Yup schema with .min(N) on a password field where N < 8."
    pattern: '(?:password|pwd|passwd)[^.]*\.min\s*\(\s*[1-7]\b'
    flags: gi
    require_ai_confirm: true
