id: owasp/a07-auth-failures/insecure-password-storage
version: 1.0.0
category: owasp-top-10
owasp_ref: A07:2021
cwe: [CWE-256, CWE-257, CWE-916]
severity_default: critical
languages: [javascript, typescript, python]
authors: [oh-pen-testing-core]
description: "Detects plaintext password storage (writing req.body.password directly to DB) or weak non-bcrypt hashing for passwords."
impact: |
  Plaintext passwords in the database mean a single SQL injection or backup leak instantly exposes every user's password — no cracking needed, and since most people reuse passwords, the attacker now has credentials for their email, banking, and other services too. Weak hashing (unsalted MD5 or SHA-1) is nearly as bad: large precomputed rainbow tables crack the majority of real-world passwords in seconds. Either way, the breach damage extends far beyond your application and can never be fully undone once credentials are in the wild.
risky: false
requires_ai: true
type: regex
rules:
  - id: store-password-plain
    description: "Inserting/updating a password column with raw unhashed value."
    pattern: '(?:INSERT\s+INTO|UPDATE)\s+\w+\s+SET\s+[^;]*password\s*=\s*[''"]?(?:\$\d|%\(password\)|\{password\})'
    flags: gi
    require_ai_confirm: true
  - id: password-equals-req-password
    description: "password field assigned directly from request body (no hash function)."
    pattern: 'password\s*:\s*req\.body\.password\b'
    flags: g
    require_ai_confirm: true
  - id: password-plain-compare
    description: "Plaintext equality comparison for password auth (user.password === req.body.password)."
    pattern: '\b(?:user|account|record)\.(?:password|pwd)\s*===?\s*(?:req|request)\.(?:body|params|query)\.(?:password|pwd)\b'
    flags: g
    require_ai_confirm: true
