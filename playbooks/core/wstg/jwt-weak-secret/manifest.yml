id: wstg/jwt-weak-secret
version: 1.0.0
category: wstg
cwe: [CWE-798, CWE-326]
severity_default: high
languages: [javascript, typescript, python]
authors: [oh-pen-testing-core]
description: "Detects JWT signing/verification using a short, hardcoded, or env-default secret."
impact: |
  A weak or hardcoded JWT secret can be brute-forced offline — tools like hashcat crack short HMAC-SHA256 JWT secrets in seconds on commodity hardware, and dictionaries of common default secrets (e.g. "secret", "changeme", "your-256-bit-secret") are tried first. Once the secret is known, the attacker can forge arbitrary tokens: they can impersonate any user ID, elevate their own role to admin, and extend token expiry indefinitely. Unlike a stolen session cookie, a forged JWT works from anywhere with no session state to invalidate.
risky: false
requires_ai: true
type: regex
rules:
  - id: jwt-sign-short-secret
    description: "jsonwebtoken sign() with a short literal secret."
    pattern: 'jwt\.sign\s*\(\s*[^,]+,\s*["''`][^"''`]{1,15}["''`]'
    flags: g
    require_ai_confirm: true
  - id: pyjwt-encode-short
    description: "PyJWT encode with a short literal secret."
    pattern: 'jwt\.encode\s*\(\s*[^,]+,\s*["''][^"'']{1,15}["'']'
    flags: g
    require_ai_confirm: true
