id: secrets/hardcoded-secrets-scanner
version: 1.0.0
category: secrets
owasp_ref: A02:2021
cwe: [CWE-798, CWE-321]
severity_default: critical
languages:
  - javascript
  - typescript
  - python
  - java
  - csharp
  - go
  - ruby
  - php
  - generic
authors:
  - oh-pen-testing-core
description: Detects hardcoded credentials, API keys, tokens, and private keys in source files.
risky: false
requires_ai: true
type: regex
# Rules are referenced by ID; executable patterns live in
# packages/core/src/playbook-runner/builtin-rules/secrets.ts
rules:
  - id: aws-access-key-id
    description: AWS Access Key ID (AKIA-prefixed).
    pattern: '\bAKIA[0-9A-Z]{16}\b'
    flags: g
    require_ai_confirm: true
  - id: aws-secret-access-key
    description: AWS Secret Access Key literal near a labelled assignment.
    pattern: '(?:aws_?secret_?access_?key|aws[._-]?secret)[''"\s:=]{1,8}[''"]([A-Za-z0-9/+=]{40})[''"]'
    flags: gi
    require_ai_confirm: true
  - id: github-pat
    description: GitHub Personal Access Token (ghp_/gho_/ghu_/ghs_/ghr_).
    pattern: '\bgh[pous]_[A-Za-z0-9]{36,}\b'
    flags: g
    require_ai_confirm: true
  - id: slack-token
    description: Slack OAuth token (xoxb-/xoxp-/xoxa-/xoxr-/xoxs-).
    pattern: '\bxox[baprs]-[A-Za-z0-9-]{10,}\b'
    flags: g
    require_ai_confirm: true
  - id: private-key-header
    description: PEM private key header.
    pattern: '-----BEGIN (RSA |EC |OPENSSH |DSA )?PRIVATE KEY-----'
    flags: g
    require_ai_confirm: false
  - id: generic-high-entropy-api-key
    description: Labelled assignment of a high-entropy string (api_key/secret/token).
    pattern: '(?:api[_-]?key|secret|token)\s*[=:]\s*[''"]([A-Za-z0-9/_+=-]{24,})[''"]'
    flags: gi
    require_ai_confirm: true
